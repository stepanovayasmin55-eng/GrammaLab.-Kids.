<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --main: #00a2ff; --green: #2ecc71; --red: #e74c3c; --gold: #ffcc00; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #f4f7f9; user-select: none; }
        header { background: var(--main); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .screen { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* ИГРОВОЕ ПОЛЕ */
        .stage { background: white; border-radius: 30px; height: 380px; position: relative; border: 5px solid var(--main); overflow: hidden; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        
        /* 💡 КАРТОЧКИ 3D */
        .card-3d { perspective: 1000px; width: 260px; height: 320px; }
        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1); transform-style: preserve-3d; cursor: pointer; }
        .flipped { transform: rotateY(180deg); }
        .front, .back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 20px; border: 4px solid var(--main); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .back { background: #f9f9f9; transform: rotateY(180deg); }

        /* 🎡 КОЛЕСО */
        #w-canvas { border-radius: 50%; border: 6px solid #333; transition: transform 4s cubic-bezier(0.1, 0, 0.1, 1); }

        /* 🎰 АВТОМАТ */
        .reel { width: 80px; height: 120px; background: #eee; border: 3px solid #444; border-radius: 8px; overflow: hidden; position: relative; }
        .reel-move { position: absolute; width: 100%; transition: top 2s cubic-bezier(0.45, 0.05, 0.55, 0.95); }
        .slot-item { height: 120px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; }

        /* КНОПКИ */
        .btn { padding: 16px; border-radius: 18px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin: 8px 0; font-size: 16px; transition: 0.2s; }
        .btn-main { background: var(--main); color: white; box-shadow: 0 5px 0 #0081cc; }
        .btn-ai { background: var(--gold); color: black; box-shadow: 0 5px 0 #d4aa00; }
        .btn-opt { background: white; border: 2px solid #ddd; margin: 4px 0; }
        .btn-opt:active { background: #eee; }

        .q-card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 15px; border: 1px solid #ddd; }
    </style>
</head>
<body>

<header>
    <b style="font-size: 22px;">💎 GrammaLab Pro</b>
    <button class="btn" style="width:auto; margin:0; padding:8px 15px; background:var(--gold);" onclick="location.reload()">🏠</button>
</header>

<div id="menu" class="screen active">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 15px;">
        <div class="btn btn-main" onclick="setMode('cards')" style="height:80px; display:flex; align-items:center; justify-content:center; flex-direction:column;"><span>💡</span>Карточки</div>
        <div class="btn btn-main" onclick="setMode('wheel')" style="height:80px; display:flex; align-items:center; justify-content:center; flex-direction:column;"><span>🎡</span>Колесо</div>
        <div class="btn btn-main" onclick="setMode('mole')" style="height:80px; display:flex; align-items:center; justify-content:center; flex-direction:column;"><span>🔨</span>Крот</div>
        <div class="btn btn-main" onclick="setMode('slots')" style="height:80px; display:flex; align-items:center; justify-content:center; flex-direction:column;"><span>🎰</span>Автомат</div>
        <div class="btn btn-main" onclick="setMode('anagram')" style="height:80px; display:flex; align-items:center; justify-content:center; flex-direction:column;"><span>🔠</span>Анаграмма</div>
        <div class="btn btn-main" onclick="setMode('maze')" style="height:80px; display:flex; align-items:center; justify-content:center; flex-direction:column;"><span>👾</span>Лабиринт</div>
    </div>
</div>

<div id="editor" class="screen">
    <h2 id="mode-title" style="text-align:center; color:var(--main);"></h2>
    <button class="btn btn-ai" onclick="geminiAI()">✨ Спросить Gemini (ИИ Мастер)</button>
    <div id="factory"></div>
    <button class="btn btn-main" style="background:#777; box-shadow:0 5px 0 #444;" onclick="addQ()">➕ Свой вопрос</button>
    <button class="btn" style="background:var(--green); color:white; box-shadow:0 5px 0 #1b8a4a;" onclick="play()">ИГРАТЬ ▶️</button>
</div>

<div id="game" class="screen">
    <h3 id="q-text" style="text-align:center; min-height:40px;"></h3>
    <div class="stage" id="stage"></div>
    <div id="ans-box"></div>
</div>

<script>
    let mode = '', questions = [], cur = 0, score = 0, anagramText = "";

    function setMode(m) { mode = m; show('editor'); document.getElementById('mode-title').innerText = "Режим: " + m.toUpperCase(); if(!questions.length) addQ(); }

    function addQ(q="", a=["","",""], c=0) {
        const d = document.createElement('div'); d.className = 'q-card';
        d.innerHTML = `<input type="text" placeholder="Вопрос / Слово" value="${q}" class="qi" style="width:100%; padding:10px; border-radius:10px; border:2px solid #ddd; box-sizing:border-box; margin-bottom:10px;">
                       <div class="al"></div>`;
        document.getElementById('factory').appendChild(d);
        const l = d.querySelector('.al');
        a.forEach((t, i) => {
            const r = document.createElement('div'); r.style="display:flex; gap:10px; margin-bottom:5px;";
            r.innerHTML = `<input type="radio" name="r${Math.random()}" ${i===c?'checked':''}> <input type="text" value="${t}" class="ai" style="flex:1;">`;
            l.appendChild(r);
        });
    }

    function geminiAI() {
        const t = prompt("На какую тему создать вопрос?");
        if(t) addQ(`Вопрос про "${t}"`, ["Верно", "Ложь", "Хм..."], 0);
    }

    function play() {
        questions = [];
        document.querySelectorAll('.q-card').forEach(c => {
            const q = c.querySelector('.qi').value;
            const opts = [];
            c.querySelectorAll('.al div').forEach(r => {
                opts.push({ t: r.querySelector('.ai').value, ok: r.querySelector('input').checked });
            });
            if(q) questions.push({q, opts});
        });
        cur = 0; score = 0; show('game'); renderGame();
    }

    function renderGame() {
        const it = questions[cur]; const st = document.getElementById('stage'); const ab = document.getElementById('ans-box');
        st.innerHTML = ""; ab.innerHTML = ""; document.getElementById('q-text').innerText = it.q;

        if(mode === 'cards') {
            st.innerHTML = `<div class="card-3d"><div class="card-inner" id="card">
                <div class="front" style="background:var(--main); color:white;"><h2>${it.q}</h2><small>Нажми!</small></div>
                <div class="back" id="back-ans"></div></div></div>`;
            document.getElementById('card').onclick = () => document.getElementById('card').classList.add('flipped');
            it.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-opt'; b.innerText = o.t;
                b.onclick = (e) => { e.stopPropagation(); if(o.ok){score++; confetti();} next(); };
                st.querySelector('#back-ans').appendChild(b);
            });
        }
        else if(mode === 'wheel') {
            st.innerHTML = `<canvas id="w-canvas" width="280" height="280"></canvas>`;
            const c = st.querySelector('canvas'); drawWheel(c, it);
            const b = document.createElement('button'); b.className = 'btn btn-main'; b.innerText = "КРУТИТЬ!";
            b.onclick = () => {
                c.style.transform = `rotate(${1800 + Math.random()*1000}deg)`;
                setTimeout(() => {
                    it.opts.forEach(o => {
                        const ob = document.createElement('button'); ob.className = 'btn btn-opt'; ob.innerText = o.t;
                        ob.onclick = () => { if(o.ok){score++; confetti();} next(); };
                        ab.appendChild(ob);
                    });
                }, 4100);
            };
            ab.appendChild(b);
        }
        else if(mode === 'slots') {
            const wrap = document.createElement('div'); wrap.style="display:flex; gap:10px;";
            it.opts.forEach((o, i) => {
                const r = document.createElement('div'); r.className = 'reel';
                r.innerHTML = `<div class="reel-move" style="top:0"><div class="slot-item">🎰</div><div class="slot-item">✨</div><div class="slot-item">${o.t}</div></div>`;
                wrap.appendChild(r);
                setTimeout(() => r.querySelector('.reel-move').style.top = "-240px", i*200);
                r.onclick = () => { if(o.ok){score++; confetti();} next(); };
            });
            st.appendChild(wrap);
        }
        else {
            it.opts.forEach(o => {
                const b = document.createElement('button'); b.className = 'btn btn-opt'; b.innerText = o.t;
                b.onclick = () => { if(o.ok){score++; confetti();} next(); };
                ab.appendChild(b);
            });
        }
    }

    function drawWheel(c, it) {
        const ctx = c.getContext('2d'); const s = (Math.PI*2)/it.opts.length;
        it.opts.forEach((o, i) => {
            ctx.beginPath(); ctx.fillStyle = i%2 ? '#00a2ff' : '#ffcc00';
            ctx.moveTo(140, 140); ctx.arc(140, 140, 135, s*i, s*(i+1)); ctx.fill();
            ctx.save(); ctx.translate(140, 140); ctx.rotate(s*i + s/2);
            ctx.fillStyle="white"; ctx.font="bold 12px Arial"; ctx.fillText(o.t.substr(0,10), 60, 5); ctx.restore();
        });
    }

    function next() { cur++; if(cur < questions.length) renderGame(); else { alert("Твой счет: " + score); location.reload(); } }
    function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
</script>
</body>
</html>
