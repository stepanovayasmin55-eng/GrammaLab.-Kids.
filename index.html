<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Ultimate</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f4f8; --main: #00a2ff; --dark: #0077b6; --gold: #ffcc00; --green: #2ecc71; --red: #e74c3c; --white: #ffffff; --purple: #a29bfe; }
        
        /* ГАРАНТИРОВАННЫЙ СКРОЛЛ */
        html, body { 
            height: auto !important; 
            min-height: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            font-family: 'Segoe UI', sans-serif; 
            overflow-y: auto !important; 
            -webkit-overflow-scrolling: touch;
        }

        header { background: var(--main); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        .scroll-wrapper { padding: 15px; display: block; min-height: 100vh; }
        
        .screen { display: none; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: white; border: 2px solid var(--main); border-radius: 15px; padding: 12px; text-align: center; font-weight: bold; font-size: 13px; }
        .card span { display: block; font-size: 22px; }

        .game-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 3px solid var(--main); border-radius: 12px; background: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* Переключатель таймера */
        .mode-toggle { background: #eee; border-radius: 10px; display: flex; padding: 5px; margin: 10px 0; }
        .mode-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .mode-active { background: var(--main); color: white; }

        .timer-bar { height: 8px; background: #eee; border-radius: 10px; margin: 10px 0; display: none; overflow: hidden; }
        #timer-fill { height: 100%; background: var(--green); width: 100%; transition: width 0.1s linear; }

        input { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        .share-box { background: #f9f9f9; padding: 10px; border: 1px dashed #999; font-size: 10px; word-break: break-all; margin: 10px 0; display: none; }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">💎 GrammaLab Pro</div>
    <button onclick="location.reload()" style="background:var(--gold); border:none; padding:5px 10px; border-radius:8px;">🏠</button>
</header>

<div class="scroll-wrapper">
    <div id="main-screen" class="screen active">
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <button class="game-btn" style="margin:0; background:var(--purple); color:white; border:none;" onclick="importGame()">📥 Вставить код</button>
        </div>

        <h2>🔥 Популярные</h2>
        <div class="grid">
            <div class="card" onclick="startPop('не_с_глаголами')"><span>🚫</span>Не с глаг.</div>
            <div class="card" onclick="startPop('спряжения')"><span>🔄</span>Спряжения</div>
        </div>

        <h2>🕹 Шаблоны (11 игр)</h2>
        <div class="grid" id="tpl-grid"></div>
    </div>

    <div id="editor" class="screen">
        <h3>Настройка игры</h3>
        <button class="game-btn" style="background:var(--gold); border:none;" onclick="runAI()">✨ Мастер ИИ</button>
        <input type="text" id="ed-q" placeholder="Вопрос">
        <input type="text" id="ed-a" placeholder="Верный ответ">
        <input type="text" id="ed-w" placeholder="Ложный ответ">
        
        <p>Режим времени:</p>
        <div class="mode-toggle">
            <button id="btn-timer-on" class="mode-btn mode-active" onclick="setTimer(true)">С таймером</button>
            <button id="btn-timer-off" class="mode-btn" onclick="setTimer(false)">Без таймера</button>
        </div>

        <button class="game-btn" style="background:var(--green); color:white; border:none;" onclick="runCustom()">▶️ ИГРАТЬ</button>
        <button class="game-btn" style="background:var(--purple); color:white; border:none;" onclick="exportGame()">💾 Копировать код</button>
        <div id="copy-box" class="share-box"></div>
    </div>

    <div id="game-zone" class="screen">
        <div id="timer-ui" class="timer-bar"><div id="timer-fill"></div></div>
        <div id="q-text" style="font-size:20px; text-align:center; font-weight:bold; margin-bottom:20px;"></div>
        <div id="options-box"></div>
        <div id="feedback" style="text-align:center; height:20px; font-weight:bold;"></div>
        <button id="next-btn" class="game-btn" style="display:none; background:var(--main); color:white;" onclick="nextStep()">Дальше →</button>
    </div>

    <div id="result-screen" class="screen" style="text-align:center;">
        <div id="final-stars" style="font-size:50px;"></div>
        <div id="final-score" style="font-size:40px; font-weight:bold; color:var(--main);"></div>
        <div id="error-log" style="text-align:left; margin-top:15px;"></div>
        <button class="game-btn" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, d) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    let questions = [], curIdx = 0, score = 0, fails = [], useTimer = true, timerInt, timeLeft = 300;

    const icons = ["📝 Викторина","🔨 Крот","🎡 Колесо","🔠 Буквы","🃏 Карты","👥 Пары","👾 Лабиринт","🏃 Погоня","✍️ Фраза","💡 Карточки","↔️ Связи"];
    icons.forEach(i => {
        const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<span>${i.split(' ')[0]}</span>${i.split(' ')[1]}`;
        d.onclick = () => showScreen('editor'); document.getElementById('tpl-grid').appendChild(d);
    });

    function setTimer(v) {
        useTimer = v;
        document.getElementById('btn-timer-on').classList.toggle('mode-active', v);
        document.getElementById('btn-timer-off').classList.toggle('mode-active', !v);
    }

    function runAI() {
        const t = prompt("Тема для ИИ:");
        if(t) {
            document.getElementById('ed-q').value = "Как пишется слово с темой " + t + "?";
            document.getElementById('ed-a').value = "Правильно";
            document.getElementById('ed-w').value = "С ошибкой";
        }
    }

    function exportGame() {
        const obj = { q: document.getElementById('ed-q').value, a: document.getElementById('ed-a').value, w: document.getElementById('ed-w').value, t: useTimer };
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(obj))));
        const box = document.getElementById('copy-box'); box.innerText = code; box.style.display = 'block';
        alert("Код готов в серой рамке!");
    }

    function importGame() {
        const c = prompt("Вставь код:");
        if(c) {
            const r = JSON.parse(decodeURIComponent(escape(atob(c))));
            document.getElementById('ed-q').value = r.q; document.getElementById('ed-a').value = r.a; document.getElementById('ed-w').value = r.w;
            setTimer(r.t); showScreen('editor');
        }
    }

    function startPop(k) {
        if(k === 'не_с_глаголами') questions = [{q:'(не)был', a:'не был', w:'небыл'}, {q:'(не)навидеть', a:'ненавидеть', w:'не навидеть'}];
        else questions = [{q:'строить (спр?)', a:'2 спр', w:'1 спр'}];
        initSession();
    }

    function runCustom() {
        const q=document.getElementById('ed-q').value, a=document.getElementById('ed-a').value, w=document.getElementById('ed-w').value;
        if(q && a) { questions = [{q, a, w}]; initSession(); }
    }

    function initSession() {
        curIdx = 0; score = 0; fails = []; showScreen('game-zone'); renderQ();
    }

    function renderQ() {
        clearInterval(timerInt);
        const item = questions[curIdx];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('next-btn').style.display = "none";
        document.getElementById('feedback').innerText = "";
        
        const box = document.getElementById('options-box'); box.innerHTML = "";
        const bar = document.getElementById('timer-ui');
        
        if(useTimer) {
            bar.style.display = 'block'; timeLeft = 300;
            timerInt = setInterval(() => {
                timeLeft--; document.getElementById('timer-fill').style.width = (timeLeft/3) + "%";
                if(timeLeft <= 0) { clearInterval(timerInt); handleAns(false, null, item); }
            }, 100);
        } else { bar.style.display = 'none'; }

        [{t:item.a, c:true}, {t:item.w, c:false}].sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('button'); b.className = 'game-btn'; b.innerText = o.t;
            b.onclick = () => handleAns(o.c, b, item); box.appendChild(b);
        });
    }

    function handleAns(c, b, item) {
        clearInterval(timerInt);
        document.querySelectorAll('#options-box button').forEach(btn => btn.disabled = true);
        if(c) { score++; if(b) b.style.borderColor = "var(--green)"; playSnd(600, 0.2); }
        else { if(b) b.classList.add('shake'); fails.push(item.q); playSnd(200, 0.3); }
        document.getElementById('next-btn').style.display = "block";
    }

    function nextStep() { curIdx++; if(curIdx < questions.length) renderQ(); else finish(); }

    function finish() {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        if(score === questions.length) {
            document.getElementById('final-stars').innerText = "⭐️⭐️⭐️";
            confetti({particleCount: 150}); playSnd(800, 0.5);
        } else { document.getElementById('final-stars').innerText = "⭐️"; }
        document.getElementById('error-log').innerHTML = fails.length ? "Ошибки: " + fails.join(', ') : "Без ошибок! 🔥";
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
