<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLab Kids — Твой Конструктор</title>
    <style>
        :root { --bg: #ffffff; --blue: #e3f2fd; --main: #00a2ff; --dark: #0077b6; --text: #333; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
        header { background: var(--main); padding: 15px; text-align: center; color: white; font-weight: bold; }
        .container { max-width: 800px; margin: 20px auto; padding: 20px; }

        /* Видео */
        .main-video { width: 100%; height: 350px; background: #000; border-radius: 15px; margin-bottom: 20px; border: 4px solid var(--blue); }

        /* Сетка игр */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; }
        .card { background: var(--blue); border: 2px solid var(--main); border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; }

        /* РЕДАКТОР (как на твоем фото) */
        #editor { display: none; background: #f9f9f9; padding: 20px; border-radius: 15px; border: 2px solid var(--main); }
        .q-block { background: white; padding: 15px; border-radius: 10px; border: 1px solid #ddd; margin-bottom: 15px; }
        .ans-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; padding: 5px; border: 1px solid #eee; border-radius: 8px; }
        
        /* КНОПКА-ПЕРЕКЛЮЧАТЕЛЬ */
        .status-btn { font-size: 24px; cursor: pointer; width: 40px; text-align: center; user-select: none; transition: 0.2s; }
        .status-btn:hover { transform: scale(1.2); }
        
        input[type="text"] { flex: 1; border: none; outline: none; font-size: 16px; padding: 5px; }
        
        .btn-play { background: var(--main); color: white; border: none; padding: 15px; border-radius: 10px; font-size: 18px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        #game-zone { display: none; text-align: center; }
    </style>
</head>
<body>

<header>💎 GrammaLab Kids Studio</header>

<div class="container">
    <div id="main-screen">
        <div class="main-video">
            <iframe width="100%" height="100%" src="https://www.youtube.com/embed/S_8q0sO1RMo" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="grid" id="menu"></div>
    </div>

    <div id="editor">
        <h2 id="ed-title">Настройка</h2>
        <input type="text" id="topic" placeholder="Тема занятия..." style="border: 2px solid var(--main); margin-bottom:15px; border-radius:8px; padding:10px; width:97%;">
        
        <div id="q-list">
            <div class="q-block">
                <input type="text" class="q-val" placeholder="Введите вопрос">
                <div class="ans-row">
                    <div class="status-btn" onclick="toggleStatus(this)">✅</div>
                    <input type="text" class="ans-text" placeholder="Правильный ответ">
                </div>
                <div class="ans-row">
                    <div class="status-btn" onclick="toggleStatus(this)">❌</div>
                    <input type="text" class="ans-text" placeholder="Неправильный ответ">
                </div>
                <div class="ans-row">
                    <div class="status-btn" onclick="toggleStatus(this)">❌</div>
                    <input type="text" class="ans-text" placeholder="Неправильный ответ">
                </div>
            </div>
        </div>

        <button class="btn-play" style="background:#27ae60" onclick="addQ()">➕ Добавить вопрос</button>
        <button class="btn-play" onclick="play()">ЗАПУСТИТЬ</button>
    </div>

    <div id="game-zone">
        <h2 id="g-title"></h2>
        <div id="g-content" style="background:var(--blue); padding:30px; border-radius:20px; border:3px solid var(--main);"></div>
        <button class="btn-play" style="background:#ccc; margin-top:20px" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    // Список игр
    const games = ['Викторина','Колесо','Анаграмма','Сопоставить','Закончи фразу','Крот','Карты','Флеш карты','Найти пару','Лабиринт','Открой поле'];
    const menu = document.getElementById('menu');
    games.forEach(g => { menu.innerHTML += `<div class="card" onclick="openEd('${g}')">${g}</div>`; });

    function openEd(m) {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('editor').style.display = 'block';
        document.getElementById('ed-title').innerText = "Настройка: " + m;
    }

    // ГЛАВНАЯ ФУНКЦИЯ ДЛЯ ПЕРЕКЛЮЧЕНИЯ ✅ и ❌
    function toggleStatus(btn) {
        if(btn.innerText === "✅") {
            btn.innerText = "❌";
        } else {
            btn.innerText = "✅";
        }
    }

    function addQ() {
        const div = document.createElement('div');
        div.className = 'q-block';
        div.innerHTML = `<input type="text" class="q-val" placeholder="Введите вопрос">
            <div class="ans-row"><div class="status-btn" onclick="toggleStatus(this)">✅</div><input type="text" class="ans-text" placeholder="Ответ"></div>
            <div class="ans-row"><div class="status-btn" onclick="toggleStatus(this)">❌</div><input type="text" class="ans-text" placeholder="Ответ"></div>`;
        document.getElementById('q-list').appendChild(div);
    }

    function play() {
        document.getElementById('editor').style.display = 'none';
        document.getElementById('game-zone').style.display = 'block';
        // Здесь логика запуска самой игры
        document.getElementById('g-content').innerHTML = "Игра готова! (Здесь будет твой контент)";
    }
</script>
</body>
</html>
