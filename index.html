<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Pro + Audio</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f4f8; --main: #00a2ff; --dark: #0077b6; --gold: #ffcc00; --green: #2ecc71; --red: #e74c3c; --white: #ffffff; }
        html, body { height: 100%; margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; -webkit-overflow-scrolling: touch; }
        header { background: var(--main); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .scroll-wrapper { padding: 15px; padding-bottom: 50px; }
        .screen { display: none; background: var(--white); border-radius: 25px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 10px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: white; border: 2px solid var(--main); border-radius: 18px; padding: 15px; text-align: center; font-weight: bold; cursor: pointer; }
        .game-btn { display: block; width: 100%; padding: 18px; margin: 12px 0; border: 3px solid var(--main); border-radius: 15px; background: white; font-size: 18px; font-weight: bold; cursor: pointer; }
        .timer-bar { height: 8px; background: #eee; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timer-fill { height: 100%; background: linear-gradient(to right, var(--main), var(--green)); width: 100%; transition: width 0.1s linear; }
        .correct { background: var(--green) !important; color: white !important; border-color: var(--green) !important; }
        .shake { animation: shake 0.3s; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ccc; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">💎 GrammaLab Audio</div>
    <div style="font-size: 12px; background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 10px;">🏆 Рекорд: <span id="top-score">0</span></div>
</header>

<div class="scroll-wrapper">
    <div id="main-screen" class="screen active">
        <h2>🔥 Темы</h2>
        <div class="grid">
            <div class="card" onclick="start('не_с_глаголами')"><span>🚫</span>Не с глаг.</div>
            <div class="card" onclick="start('спряжения')"><span>🔄</span>Спряжения</div>
        </div>
        <h2>🕹 Шаблоны (11)</h2>
        <div class="grid" id="templates-grid"></div>
        <button class="game-btn" style="margin-top:20px; background:var(--gold); border:none;" onclick="openEditor()">🛠 Свой урок</button>
    </div>

    <div id="game-zone" class="screen">
        <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:5px;"><span>Таймер 30с</span><span id="seconds-left">30s</span></div>
        <div class="timer-bar"><div id="timer-fill"></div></div>
        <div id="q-text" style="font-size:22px; text-align:center; font-weight:bold; margin-bottom:20px;"></div>
        <div id="options-box"></div>
        <button id="next-btn" class="game-btn" style="display:none; background:var(--main); color:white;" onclick="nextStep()">Дальше →</button>
    </div>

    <div id="editor" class="screen">
        <h3>Новый урок</h3>
        <input type="text" id="ed-q" placeholder="Вопрос">
        <input type="text" id="ed-a" placeholder="Верный ответ">
        <input type="text" id="ed-w" placeholder="Ложный ответ">
        <button class="game-btn" style="background:var(--green); color:white;" onclick="runCustom()">СТАРТ</button>
        <button class="game-btn" onclick="location.reload()">ОТМЕНА</button>
    </div>

    <div id="result-screen" class="screen" style="text-align:center;">
        <div style="font-size:50px;" id="final-stars"></div>
        <div style="font-size:40px; font-weight:bold; color:var(--main);" id="final-score"></div>
        <div id="error-log" style="margin:20px 0;"></div>
        <button class="game-btn" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    function playSound(freq, type, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    const sound = {
        correct: () => { playSound(660, 'sine', 0.2); setTimeout(()=>playSound(880, 'sine', 0.3), 100); },
        wrong: () => { playSound(150, 'sawtooth', 0.4); },
        tick: () => { playSound(400, 'sine', 0.05); },
        win: () => { [523, 659, 783, 1046].forEach((f, i) => setTimeout(() => playSound(f, 'sine', 0.4), i*150)); }
    };

    let questions = [], curIdx = 0, points = 0, fails = [], timerInterval, timeLeft = 300;

    const library = {
        'не_с_глаголами': [{q:'(не)навидеть', a:'ненавидеть', w:'не навидеть'}, {q:'(не)был', a:'не был', w:'небыл'}],
        'спряжения': [{q:'строить', a:'2 спр', w:'1 спр'}, {q:'брить', a:'1 спр', w:'2 спр'}]
    };

    document.getElementById('top-score').innerText = localStorage.getItem('gl_record') || 0;

    const icons = ["📝","🔨","🎡","🔠","🃏","👥","👾","🏃","✍️","💡","↔️"];
    icons.forEach((ico, i) => {
        const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<span>${ico}</span>`;
        d.onclick = () => openEditor(); document.getElementById('templates-grid').appendChild(d);
    });

    function start(key) { questions = library[key]; initGame(); }
    function openEditor() { showScreen('editor'); }
    function runCustom() { 
        const q=document.getElementById('ed-q').value, a=document.getElementById('ed-a').value, w=document.getElementById('ed-w').value;
        if(q && a) { questions = [{q, a, w}]; initGame(); }
    }

    function initGame() { 
        curIdx=0; points=0; fails=[]; 
        if(audioCtx.state === 'suspended') audioCtx.resume();
        showScreen('game-zone'); renderQ(); 
    }

    function renderQ() {
        clearInterval(timerInterval); timeLeft = 300; updateUI();
        const item = questions[curIdx];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('next-btn').style.display = "none";
        const box = document.getElementById('options-box'); box.innerHTML = "";
        
        [{t:item.a, c:true}, {t:item.w, c:false}].sort(()=>Math.random()-0.5).forEach(o => {
            const b = document.createElement('button'); b.className = 'game-btn'; b.innerText = o.t;
            b.onclick = () => {
                clearInterval(timerInterval);
                document.querySelectorAll('.game-btn').forEach(btn => btn.disabled = true);
                if(o.c) { points++; b.classList.add('correct'); sound.correct(); }
                else { b.classList.add('shake'); fails.push(item.q); sound.wrong(); }
                document.getElementById('next-btn').style.display = "block";
            };
            box.appendChild(b);
        });

        timerInterval = setInterval(() => {
            timeLeft--; updateUI();
            if(timeLeft < 50) sound.tick();
            if(timeLeft <= 0) { clearInterval(timerInterval); sound.wrong(); nextStep(); }
        }, 100);
    }

    function updateUI() {
        document.getElementById('timer-fill').style.width = (timeLeft/3) + "%";
        document.getElementById('seconds-left').innerText = Math.ceil(timeLeft/10) + "s";
    }

    function nextStep() { curIdx++; if(curIdx < questions.length) renderQ(); else finish(); }

    function finish() {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = `${points} / ${questions.length}`;
        if(points === questions.length) { 
            document.getElementById('final-stars').innerText = "⭐️⭐️⭐️"; 
            sound.win(); confetti({particleCount:150});
        } else {
            document.getElementById('final-stars').innerText = "⭐️";
        }
        let r = parseInt(localStorage.getItem('gl_record') || 0);
        if(points > r) localStorage.setItem('gl_record', points);
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>
</body>
</html>
