      <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrammaLab Kids — Проверка знаний</title>
    <style>
        :root { --bg: #f0f4f8; --main: #00a2ff; --dark: #0077b6; --gold: #ffeb3b; --white: #ffffff; --red: #e74c3c; --green: #2ecc71; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: var(--main); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .btn { border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .container { max-width: 600px; margin: 20px auto; padding: 0 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--white); border: 2px solid var(--main); border-radius: 15px; padding: 20px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .card:hover { transform: scale(1.03); background: var(--main); color: white; }

        #game-zone, #result-screen { display: none; text-align: center; background: white; padding: 30px 20px; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        
        #q-text { font-size: 22px; margin-bottom: 25px; color: var(--dark); font-weight: bold; min-height: 60px; }
        .game-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid var(--main); border-radius: 12px; background: white; font-size: 18px; cursor: pointer; transition: 0.2s; }
        
        /* Таблица ошибок */
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        .result-table th, .result-table td { padding: 10px; border-bottom: 1px solid #eee; font-size: 14px; }
        .err-row { color: var(--red); }
        .score-val { font-size: 48px; font-weight: bold; color: var(--main); margin: 10px 0; }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold; font-size: 20px;">💎 GrammaLab</div>
    <button class="btn" style="background: var(--gold)" onclick="location.reload()">🏠 Меню</button>
</header>

<div class="container">
    <div id="main-screen">
        <h2 style="color: var(--dark)">Выбери игру:</h2>
        <div class="grid">
            <div class="card" onclick="loadPop('не_с_глаголами')">🚫 Не с глаголами</div>
            <div class="card" onclick="loadPop('спряжения')">🔄 Спряжения</div>
            <div class="card" onclick="loadPop('прямая_речь')">💬 Прямая речь</div>
            <div class="card" onclick="loadPop('местоимения')">👤 Местоимения</div>
        </div>
    </div>

    <div id="game-zone">
        <div id="progress" style="color: #999; margin-bottom: 10px; font-size: 14px;"></div>
        <div id="q-text">Загрузка...</div>
        <div id="options-box"></div>
        <div id="feedback" style="font-weight: bold; margin-top: 15px; height: 25px;"></div>
        <button id="next-btn" class="game-btn" style="display:none; background:var(--main); color:white; border:none;" onclick="nextQuestion()">Дальше →</button>
    </div>

    <div id="result-screen">
        <h2>Твой результат:</h2>
        <div class="score-val" id="final-score">0 / 0</div>
        <div id="result-comment" style="font-weight: bold; margin-bottom: 20px;"></div>
        
        <div id="errors-section">
            <h3 style="color: var(--red); text-align: left;">Работа над ошибками:</h3>
            <table class="result-table" id="errors-table">
                <thead><tr><th>Вопрос</th><th>Правильный ответ</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>

        <button class="game-btn" style="background:var(--dark); color:white; border:none; margin-top:30px;" onclick="location.reload()">ИГРАТЬ ЕЩЁ РАЗ</button>
    </div>
</div>

<script>
    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let userErrors = []; // Сюда записываем ошибки

    const popularData = {
        'не_с_глаголами': {
            qs: [
                {q: '(Не)навидеть ложь', a: 'Ненавидеть', w: 'Не навидеть'},
                {q: '(Не)был в школе', a: 'Не был', w: 'Небыл'},
                {q: '(Не)годовать из-за погоды', a: 'Негодовать', w: 'Не годовать'},
                {q: 'Друзья (не)пришли', a: 'не пришли', w: 'непришли'},
                {q: 'Мне (не)здоровится', a: 'нездоровится', w: 'не здоровится'}
            ]
        },
        'спряжения': {
            qs: [
                {q: 'Глагол 2-го спряжения:', a: 'Строить', w: 'Петь'},
                {q: 'Глагол-исключение (1 спр):', a: 'Брить', w: 'Смотреть'},
                {q: 'Ты (смотришь) — какое окончание?', a: '-ишь (2 спр)', w: '-ешь (1 спр)'},
                {q: 'Глагол на -ЕТЬ 2-го спряжения:', a: 'Терпеть', w: 'Краснеть'},
                {q: 'Они (клеят) — какой суффикс?', a: '-ят', w: '-ют'}
            ]
        },
        'прямая_речь': {
            qs: [
                {q: 'Мама сказала [?] "Иди обедать"', a: 'Двоеточие [:]', w: 'Тире [-]'},
                {q: 'С какой буквы пишется прямая речь?', a: 'С большой', w: 'С маленькой'},
                {q: 'Схема: "П", — а. Что значит "а"?', a: 'слова автора', w: 'аппликация'},
                {q: 'Во что заключается прямая речь?', a: 'В кавычки', w: 'В скобки'}
            ]
        },
        'местоимения': {
            qs: [
                {q: 'Дательный падеж (Я):', a: 'Мне', w: 'Меня'},
                {q: 'Творительный падеж (МЫ):', a: 'Нами', w: 'Нас'},
                {q: 'Предложный падеж (ОН):', a: 'О нём', w: 'Его'},
                {q: 'Родительный падеж (ТЫ):', a: 'Тебя', w: 'Тобой'}
            ]
        }
    };

    function loadPop(key) {
        currentQuestions = popularData[key].qs;
        currentIndex = 0;
        score = 0;
        userErrors = [];
        showGame();
    }

    function showGame() {
        document.getElementById('main-screen').style.display = 'none';
        document.getElementById('result-screen').style.display = 'none';
        document.getElementById('game-zone').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('progress').innerText = `Вопрос ${currentIndex + 1} из ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = q.q;
        document.getElementById('feedback').innerText = "";
        document.getElementById('next-btn').style.display = "none";
        
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        
        // Перемешиваем ответы
        let opts = [{t: q.a, isC: true}, {t: q.w, isC: false}].sort(() => Math.random() - 0.5);
        
        opts.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'game-btn';
            b.innerText = opt.t;
            b.onclick = () => checkAnswer(opt.isC, b, q);
            box.appendChild(b);
        });
    }

    function checkAnswer(isCorrect, btn, qObj) {
        const btns = document.querySelectorAll('.game-btn');
        btns.forEach(b => b.disabled = true);
        
        if(isCorrect) {
            score++;
            btn.style.borderColor = "var(--green)";
            btn.style.background = "#eafff0";
            document.getElementById('feedback').innerText = "✅ Верно!";
            document.getElementById('feedback').style.color = "var(--green)";
        } else {
            btn.style.borderColor = "var(--red)";
            btn.style.background = "#fff0f0";
            document.getElementById('feedback').innerText = "❌ Ошибка!";
            document.getElementById('feedback').style.color = "var(--red)";
            // Запоминаем ошибку
            userErrors.push({q: qObj.q, a: qObj.a});
        }
        document.getElementById('next-btn').style.display = "block";
    }

    function nextQuestion() {
        currentIndex++;
        if(currentIndex < currentQuestions.length) {
            renderQuestion();
        } else {
            showResults();
        }
    }

    function showResults() {
        document.getElementById('game-zone').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        
        document.getElementById('final-score').innerText = `${score} / ${currentQuestions.length}`;
        
        // Комментарий
        let comment = "";
        if(score === currentQuestions.length) comment = "🌟 Великолепно! Ты мастер русского языка!";
        else if(score >= currentQuestions.length / 2) comment = "👍 Хорошо, но есть над чем поработать!";
        else comment = "📚 Нужно еще немного подучить правила!";
        document.getElementById('result-comment').innerText = comment;

        // Таблица ошибок
        const tbody = document.querySelector('#errors-table tbody');
        tbody.innerHTML = "";
        
        if(userErrors.length === 0) {
            document.getElementById('errors-section').innerHTML = "<h3 style='color:var(--green)'>Ошибок нет! Ты молодец! 🏆</h3>";
        } else {
            userErrors.forEach(err => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${err.q}</td><td style="color:var(--green); font-weight:bold;">${err.a}</td>`;
                tbody.appendChild(tr);
            });
        }
    }
</script>
</body>
</html>
