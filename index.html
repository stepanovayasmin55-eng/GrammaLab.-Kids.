<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab Secret Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f4f8; --main: #00a2ff; --green: #2ecc71; --red: #e74c3c; --white: #ffffff; --gold: #ffcc00; --purple: #a29bfe; }
        html, body { min-height: 100%; margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        header { background: var(--main); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        .scroll-wrapper { padding: 15px; padding-bottom: 120px; }
        .screen { display: none; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .active { display: block; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .card { background: white; border: 2px solid var(--main); border-radius: 15px; padding: 12px; text-align: center; font-weight: bold; cursor: pointer; }
        .q-group { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #ddd; position: relative; }
        .del-q { position: absolute; top: -10px; right: -10px; background: var(--red); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; }
        .ans-row { display: flex; align-items: center; gap: 8px; margin: 8px 0; }
        .radio-custom { width: 22px; height: 22px; accent-color: var(--green); cursor: pointer; }
        input[type="text"] { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #eee; font-size: 15px; box-sizing: border-box; }
        .q-input { margin-bottom: 10px; font-weight: bold; background: #f0f9ff; border-color: var(--main) !important; }
        .game-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 3px solid var(--main); border-radius: 12px; background: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        .ans-ctrl { display: flex; gap: 10px; margin-top: 10px; }
        .s-btn { padding: 5px 10px; border-radius: 5px; border: 1px solid #ccc; background: #f9f9f9; font-size: 12px; }
        .mode-toggle { display: flex; background: #eee; padding: 5px; border-radius: 10px; margin-bottom: 15px; }
        .m-btn { flex: 1; padding: 8px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .m-active { background: var(--main); color: white; }
        .timer-bar { height: 8px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #timer-fill { height: 100%; background: var(--green); width: 100%; transition: width 0.1s linear; }
        .shake { animation: shake 0.3s; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">💎 GrammaLab Pro</div>
    <button onclick="location.reload()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px;">🏠</button>
</header>

<div class="scroll-wrapper">
    <div id="main-screen" class="screen active">
        <button class="game-btn" style="background:var(--purple); color:white; border:none;" onclick="importGame()">📥 Вставить код и ИГРАТЬ</button>
        <h2>🔥 Популярные</h2>
        <div class="grid">
            <div class="card" style="background:#fff9c4;" onclick="startPop('не_с_глаголами')"><span>🚫</span>Не с глаг.</div>
            <div class="card" style="background:#fff9c4;" onclick="startPop('спряжения')"><span>🔄</span>Спряжения</div>
        </div>
        <h2>🕹 Шаблоны</h2>
        <div class="grid" id="tpl-grid"></div>
    </div>

    <div id="editor" class="screen">
        <h3>Настройка игры</h3>
        <div class="mode-toggle">
            <button id="t-on" class="m-btn m-active" onclick="toggleT(true)">С таймером</button>
            <button id="t-off" class="m-btn" onclick="toggleT(false)">Без таймера</button>
        </div>
        <button class="game-btn" style="background:var(--gold); border:none;" onclick="runAI()">✨ Мастер ИИ</button>
        <div id="questions-factory"></div>
        <button class="game-btn" style="background:var(--green); color:white; border:none; font-size:20px;" onclick="addQuestion()">➕</button>
        <button class="game-btn" style="background:var(--main); color:white; border:none;" onclick="runGame()">▶️ ИГРАТЬ СЕЙЧАС</button>
        <button class="game-btn" style="background:#eee;" onclick="exportGame()">💾 Копировать код для друзей</button>
        <textarea id="copy-box" style="width:100%; height:50px; display:none; margin-top:10px;"></textarea>
    </div>

    <div id="game-zone" class="screen">
        <div id="timer-ui" class="timer-bar"><div id="timer-fill"></div></div>
        <div id="q-text" style="font-size:22px; text-align:center; font-weight:bold; margin-bottom:20px;"></div>
        <div id="options-box"></div>
        <button id="next-btn" class="game-btn" style="display:none; background:var(--main); color:white;" onclick="nextStep()">Дальше →</button>
    </div>

    <div id="result-screen" class="screen" style="text-align:center;">
        <div id="final-stars" style="font-size:50px;"></div>
        <div id="final-score" style="font-size:40px; font-weight:bold; color:var(--main);"></div>
        <div id="error-log" style="text-align:left; margin-top:15px; font-size:14px; color:var(--red);"></div>
        <button class="game-btn" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, d) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    let questions = [], curIdx = 0, score = 0, fails = [], timerInt, timeLeft = 300, useTimer = true;

    const icons = ["📝 Викторина","🔨 Крот","🎡 Колесо","🔠 Буквы","🃏 Карты","👥 Пары","👾 Лабиринт","🏃 Погоня","✍️ Фраза","💡 Карточки","↔️ Связи"];
    icons.forEach(i => {
        const d = document.createElement('div'); d.className = 'card'; d.innerHTML = `<span>${i.split(' ')[0]}</span>${i.split(' ')[1]}`;
        d.onclick = () => { showScreen('editor'); if(document.querySelectorAll('.q-group').length===0) addQuestion(); };
        document.getElementById('tpl-grid').appendChild(d);
    });

    function toggleT(v) {
        useTimer = v;
        document.getElementById('t-on').classList.toggle('m-active', v);
        document.getElementById('t-off').classList.toggle('m-active', !v);
    }

    function addQuestion(qText="", ansArray=[], correctIdx=0) {
        const qId = "q_" + Math.random().toString(36).substr(2, 9);
        const div = document.createElement('div');
        div.className = 'q-group';
        div.innerHTML = `
            <button class="del-q" onclick="this.parentElement.remove()">✕</button>
            <input type="text" class="q-input" placeholder="Вопрос" value="${qText}">
            <div class="answers-list"></div>
            <div class="ans-ctrl">
                <button class="s-btn" onclick="addAnswerRow(this.parentElement.previousElementSibling, '${qId}')">+ ответ</button>
                <button class="s-btn" onclick="removeAnswerRow(this.parentElement.previousElementSibling)">- ответ</button>
            </div>
        `;
        document.getElementById('questions-factory').appendChild(div);
        const list = div.querySelector('.answers-list');
        if(ansArray.length === 0) ansArray = ["", ""];
        ansArray.forEach((text, i) => addAnswerRow(list, qId, text, i === correctIdx));
    }

    function addAnswerRow(container, qId, text="", checked=false) {
        const row = document.createElement('div');
        row.className = 'ans-row';
        row.innerHTML = `<input type="radio" name="${qId}" class="radio-custom" ${checked?'checked':''}>
                         <input type="text" class="ans-text" placeholder="Вариант" value="${text}">`;
        container.appendChild(row);
    }

    function removeAnswerRow(container) { if(container.children.length > 1) container.lastElementChild.remove(); }

    function runAI() { addQuestion("Как пишется слово?", ["Правильно", "Ошибка"], 0); }

    function runGame() {
        questions = [];
        document.querySelectorAll('.q-group').forEach(g => {
            const q = g.querySelector('.q-input').value;
            const opts = [];
            g.querySelectorAll('.ans-row').forEach(row => {
                const txt = row.querySelector('.ans-text').value;
                const isCorrect = row.querySelector('.radio-custom').checked;
                if(txt) opts.push({ text: txt, isCorrect: isCorrect });
            });
            if(q && opts.length > 0) questions.push({ q, options: opts });
        });
        if(questions.length > 0) { startSession(); }
        else alert("Заполни вопросы!");
    }

    function startSession() { curIdx = 0; score = 0; fails = []; showScreen('game-zone'); renderQ(); }

    function renderQ() {
        clearInterval(timerInt);
        const item = questions[curIdx];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('next-btn').style.display = "none";
        const box = document.getElementById('options-box'); box.innerHTML = "";
        
        if(useTimer) {
            document.getElementById('timer-ui').style.display = 'block';
            timeLeft = 300;
            timerInt = setInterval(() => {
                timeLeft--; document.getElementById('timer-fill').style.width = (timeLeft/3) + "%";
                if(timeLeft <= 0) { clearInterval(timerInt); handleAns(false, null, item); }
            }, 100);
        } else { document.getElementById('timer-ui').style.display = 'none'; }

        item.options.forEach(o => {
            const b = document.createElement('button'); b.className = 'game-btn'; b.innerText = o.text;
            b.onclick = () => handleAns(o.isCorrect, b, item); box.appendChild(b);
        });
    }

    function handleAns(c, b, item) {
        clearInterval(timerInt);
        document.querySelectorAll('#options-box button').forEach(btn => btn.disabled = true);
        if(c) { score++; if(b) b.style.backgroundColor = "#d4edda"; playSnd(600, 0.2); }
        else { if(b) b.classList.add('shake'); fails.push(`В "${item.q}" ошибка.`); playSnd(200, 0.3); }
        document.getElementById('next-btn').style.display = "block";
    }

    function nextStep() { curIdx++; if(curIdx < questions.length) renderQ(); else finish(); }

    function finish() {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        if(score === questions.length) { document.getElementById('final-stars').innerText = "⭐️⭐️⭐️"; confetti(); }
        else { document.getElementById('final-stars').innerText = "⭐️"; }
        document.getElementById('error-log').innerHTML = fails.join('<br>');
    }

    function exportGame() {
        const data = { questions: [], useTimer: useTimer };
        document.querySelectorAll('.q-group').forEach(g => {
            const answers = []; let cIdx = 0;
            g.querySelectorAll('.ans-row').forEach((row, i) => {
                answers.push(row.querySelector('.ans-text').value);
                if(row.querySelector('.radio-custom').checked) cIdx = i;
            });
            data.questions.push({ q: g.querySelector('.q-input').value, a: answers, c: cIdx });
        });
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(data))));
        const area = document.getElementById('copy-box'); area.value = code; area.style.display = 'block'; area.select();
        alert("Код для друга готов! Он внизу.");
    }

    function importGame() {
        const c = prompt("Вставь код игры:");
        if(c) {
            try {
                const data = JSON.parse(decodeURIComponent(escape(atob(c))));
                questions = [];
                useTimer = data.useTimer;
                data.questions.forEach(d => {
                    const opts = d.a.map((txt, i) => ({ text: txt, isCorrect: i === d.c }));
                    questions.push({ q: d.q, options: opts });
                });
                startSession(); // СРАЗУ ИГРАЕМ!
            } catch(e) { alert("Ошибка!"); }
        }
    }

    function startPop(k) {
        useTimer = true; questions = [];
        const data = k === 'не_с_глаголами' ? 
            [{q:'(не)был', a:'не был', w:'небыл'}, {q:'(не)навидеть', a:'ненавидеть', w:'не навидеть'}] :
            [{q:'строить', a:'2 спр', w:'1 спр'}];
        data.forEach(d => {
            questions.push({ q: d.q, options: [{text: d.a, isCorrect: true}, {text: d.w, isCorrect: false}].sort(()=>Math.random()-0.5) });
        });
        startSession();
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
