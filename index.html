  <!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GrammaLab — Полный Конструктор</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root { --bg: #f0f4f8; --main: #00a2ff; --green: #2ecc71; --red: #e74c3c; --white: #ffffff; --gold: #ffcc00; }
        
        html, body { min-height: 100%; margin: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        header { background: var(--main); padding: 15px; color: white; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; }
        
        .scroll-wrapper { padding: 15px; padding-bottom: 120px; }
        .screen { display: none; background: var(--white); border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .active { display: block; }

        /* РЕДАКТОР */
        .q-group { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 25px; border: 2px solid #eee; position: relative; }
        .del-btn { position: absolute; top: -10px; right: -10px; background: var(--red); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; }
        
        .ans-row { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .radio-custom { width: 22px; height: 22px; cursor: pointer; accent-color: var(--green); }
        
        input[type="text"] { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #ddd; font-size: 16px; }
        input[type="text"]:focus { border-color: var(--main); outline: none; }
        .q-input { width: 100%; margin-bottom: 10px; background: #f9f9f9; }

        .game-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 3px solid var(--main); border-radius: 12px; background: white; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        .timer-bar { height: 8px; background: #eee; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        #timer-fill { height: 100%; background: var(--green); width: 100%; transition: width 0.1s linear; }
        
        .shake { animation: shake 0.3s; border-color: var(--red) !important; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<header>
    <div style="font-weight:bold;">💎 GrammaLab</div>
    <button onclick="location.reload()" style="background:var(--gold); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">🏠</button>
</header>

<div class="scroll-wrapper">
    <div id="main-screen" class="screen active">
        <button class="game-btn" style="background:#a29bfe; color:white; border:none;" onclick="importGame()">📥 Загрузить код</button>
        <h2>🕹 Выбери игру</h2>
        <div id="tpl-grid" style="display:grid; grid-template-columns:1fr 1fr; gap:10px;"></div>
    </div>

    <div id="editor" class="screen">
        <h3>Редактор (отметь верный 🟢)</h3>
        <div id="questions-factory"></div>
        <button class="game-btn" style="background:var(--green); color:white; border:none; font-size:24px;" onclick="addQ()">➕ Добавить вопрос</button>
        <button class="game-btn" style="background:var(--main); color:white; border:none;" onclick="runGame()">▶️ ИГРАТЬ</button>
        <button class="game-btn" style="background:#eee;" onclick="exportGame()">💾 Копировать код</button>
        <div id="copy-box" style="font-size:10px; background:#f1f1f1; padding:10px; display:none; word-break:break-all;"></div>
    </div>

    <div id="game-zone" class="screen">
        <div id="timer-ui" class="timer-bar"><div id="timer-fill"></div></div>
        <div id="q-text" style="font-size:22px; text-align:center; font-weight:bold; margin-bottom:20px;"></div>
        <div id="options-box"></div>
        <button id="next-btn" class="game-btn" style="display:none; background:var(--main); color:white;" onclick="nextStep()">Дальше →</button>
    </div>

    <div id="result-screen" class="screen" style="text-align:center;">
        <div id="final-stars" style="font-size:50px;"></div>
        <div id="final-score" style="font-size:40px; font-weight:bold; color:var(--main);"></div>
        <div id="error-log" style="text-align:left; margin-top:15px; font-size:14px;"></div>
        <button class="game-btn" onclick="location.reload()">В МЕНЮ</button>
    </div>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSnd(f, d) {
        if(audioCtx.state === 'suspended') audioCtx.resume();
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.value = f; g.gain.value = 0.1;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + d);
    }

    let questions = [], curIdx = 0, score = 0, fails = [], timerInt, timeLeft = 300;

    const icons = ["📝 Викторина","🔨 Крот","🎡 Колесо","🔠 Буквы","🃏 Карты","👥 Пары","👾 Лабиринт","🏃 Погоня","✍️ Фраза","💡 Карточки","↔️ Связи"];
    icons.forEach(i => {
        const d = document.createElement('div'); d.className = 'game-btn'; 
        d.innerHTML = i; d.style.textAlign = 'center';
        d.onclick = () => { showScreen('editor'); if(document.querySelectorAll('.q-group').length===0) addQ(); };
        document.getElementById('tpl-grid').appendChild(d);
    });

    function addQ(q="", a1="", a2="", correctNum=1) {
        const id = Date.now();
        const div = document.createElement('div');
        div.className = 'q-group';
        div.innerHTML = `
            <button class="del-btn" onclick="this.parentElement.remove()">✕</button>
            <input type="text" class="q-input" placeholder="Твой вопрос" value="${q}">
            <div class="ans-row">
                <input type="radio" name="correct_${id}" class="radio-custom" value="1" ${correctNum==1?'checked':''}>
                <input type="text" class="ans-text" placeholder="Вариант 1" value="${a1}">
            </div>
            <div class="ans-row">
                <input type="radio" name="correct_${id}" class="radio-custom" value="2" ${correctNum==2?'checked':''}>
                <input type="text" class="ans-text" placeholder="Вариант 2" value="${a2}">
            </div>
        `;
        document.getElementById('questions-factory').appendChild(div);
    }

    function runGame() {
        questions = [];
        document.querySelectorAll('.q-group').forEach(g => {
            const q = g.querySelector('.q-input').value;
            const answers = g.querySelectorAll('.ans-text');
            const correctIdx = g.querySelector('input[type="radio"]:checked').value - 1;
            if(q && answers[0].value) {
                questions.push({
                    q: q,
                    options: [
                        { text: answers[0].value, isCorrect: correctIdx === 0 },
                        { text: answers[1].value, isCorrect: correctIdx === 1 }
                    ]
                });
            }
        });
        if(questions.length > 0) { curIdx = 0; score = 0; fails = []; showScreen('game-zone'); renderQ(); }
        else alert("Заполни хотя бы один вопрос!");
    }

    function renderQ() {
        clearInterval(timerInt);
        const item = questions[curIdx];
        document.getElementById('q-text').innerText = item.q;
        document.getElementById('next-btn').style.display = "none";
        const box = document.getElementById('options-box'); box.innerHTML = "";
        
        timeLeft = 300;
        timerInt = setInterval(() => {
            timeLeft--; document.getElementById('timer-fill').style.width = (timeLeft/3) + "%";
            if(timeLeft <= 0) { clearInterval(timerInt); handleAns(false, null, item); }
        }, 100);

        item.options.forEach(o => {
            const b = document.createElement('button'); b.className = 'game-btn'; b.innerText = o.text;
            b.onclick = () => handleAns(o.isCorrect, b, item); box.appendChild(b);
        });
    }

    function handleAns(c, b, item) {
        clearInterval(timerInt);
        document.querySelectorAll('#options-box button').forEach(btn => btn.disabled = true);
        if(c) { score++; if(b) b.style.backgroundColor = "#d4edda"; playSnd(600, 0.2); }
        else { if(b) b.classList.add('shake'); fails.push(`В "${item.q}" ошибка.`); playSnd(200, 0.3); }
        document.getElementById('next-btn').style.display = "block";
    }

    function nextStep() { curIdx++; if(curIdx < questions.length) renderQ(); else finish(); }

    function finish() {
        showScreen('result-screen');
        document.getElementById('final-score').innerText = `${score} / ${questions.length}`;
        if(score === questions.length) { document.getElementById('final-stars').innerText = "⭐️⭐️⭐️"; confetti({particleCount:100}); }
        else { document.getElementById('final-stars').innerText = "⭐️"; }
        document.getElementById('error-log').innerHTML = fails.join('<br>');
    }

    function exportGame() {
        const qs = [];
        document.querySelectorAll('.q-group').forEach(g => {
            qs.push({
                q: g.querySelector('.q-input').value,
                a1: g.querySelectorAll('.ans-text')[0].value,
                a2: g.querySelectorAll('.ans-text')[1].value,
                c: g.querySelector('input[type="radio"]:checked').value
            });
        });
        const code = btoa(unescape(encodeURIComponent(JSON.stringify(qs))));
        const box = document.getElementById('copy-box'); box.innerText = code; box.style.display = 'block';
    }

    function importGame() {
        const c = prompt("Вставь код:");
        if(c) {
            const data = JSON.parse(decodeURIComponent(escape(atob(c))));
            document.getElementById('questions-factory').innerHTML = "";
            data.forEach(d => addQ(d.q, d.a1, d.a2, d.c));
            showScreen('editor');
        }
    }

    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        window.scrollTo(0,0);
    }
</script>
</body>
</html>
